<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PariLine - trustless World Cup markets</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --bg:#0b0f14; --card:#121a23; --line:#1e2a38; --txt:#e8eef4; --dim:#8aa0b4;
          --home:#4da3ff; --draw:#a78bfa; --away:#ffb86b; --ok:#3ddc97; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--txt); font:15px/1.45 -apple-system,'Segoe UI',Roboto,sans-serif; padding:28px; }
  h1 { font-size:22px; letter-spacing:.3px; }
  h1 span { color:var(--ok); }
  .sub { color:var(--dim); margin:4px 0 24px; font-size:13px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  .teams { font-size:17px; font-weight:600; display:flex; justify-content:space-between; align-items:center; }
  .badge { font-size:11px; padding:2px 8px; border-radius:10px; border:1px solid var(--line); color:var(--dim); text-transform:uppercase; }
  .badge.open { color:var(--ok); border-color:var(--ok); }
  .badge.proposed { color:var(--draw); border-color:var(--draw); }
  .badge.settled { color:var(--away); border-color:var(--away); }
  .ko { color:var(--dim); font-size:12px; margin:4px 0 12px; }
  .bar { display:flex; height:10px; border-radius:5px; overflow:hidden; background:var(--line); margin-bottom:10px; }
  .bar div:nth-child(1){ background:var(--home);} .bar div:nth-child(2){ background:var(--draw);} .bar div:nth-child(3){ background:var(--away);}
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { color:var(--dim); font-weight:500; text-align:right; padding:3px 0; }
  th:first-child, td:first-child { text-align:left; }
  td { text-align:right; padding:3px 0; border-top:1px solid var(--line); }
  .o0 td:first-child{ color:var(--home);} .o1 td:first-child{ color:var(--draw);} .o2 td:first-child{ color:var(--away);}
  .tot { color:var(--dim); font-size:12px; margin-top:10px; }
  .win { color:var(--ok); font-weight:600; }
  .err { color:#ff6b6b; }
</style>
</head>
<body>
<h1>Pari<span>Line</span></h1>
<div class="sub">Parimutuel World Cup markets on Solana devnet. Settled trustlessly against TxLINE's on-chain verified scores (Merkle-proof CPI, no oracle keys, no admin).</div>
<div id="app" class="grid">loading...</div>
<script>
const NAMES = ["Home", "Draw", "Away"];
const fmt = (x, d=1) => x == null ? "-" : (x*100).toFixed(d) + "%";
const pay = (x) => x == null ? "-" : x.toFixed(2) + "x";

async function refresh() {
  const app = document.getElementById("app");
  try {
    const ms = await (await fetch("/api/markets")).json();
    if (ms.error) throw new Error(ms.error);
    app.innerHTML = ms.map(m => {
      const ko = new Date(m.kickoff);
      const live = Date.now() > m.kickoff && m.state === "open";
      const rows = [0,1,2].map(i => `
        <tr class="o${i}">
          <td>${i===0?m.home:i===2?m.away:"Draw"}${m.state==="settled"&&m.proposedOutcome===i?' <span class="win">WON</span>':""}</td>
          <td>${m.pools[i].toFixed(3)}</td>
          <td>${m.total>0?fmt(m.poolProbs[i]):"-"}</td>
          <td>${fmt(m.marketProbs && m.marketProbs[i])}</td>
          <td>${pay(m.payouts[i])}</td>
        </tr>`).join("");
      return `<div class="card">
        <div class="teams"><span>${m.home} v ${m.away}</span>
          <span class="badge ${m.state}">${live ? "locked" : m.state}</span></div>
        <div class="ko">kickoff ${ko.toLocaleString()} - fixture ${m.fixtureId}</div>
        <div class="bar">${[0,1,2].map(i=>`<div style="width:${(m.total>0?m.poolProbs[i]:1/3)*100}%"></div>`).join("")}</div>
        <table>
          <tr><th>outcome</th><th>pool SOL</th><th>crowd</th><th>market</th><th>payout</th></tr>
          ${rows}
        </table>
        <div class="tot">total staked ${m.total.toFixed(3)} SOL${m.state==="proposed" ? ` - challenge window ends ${new Date(m.challengeDeadline).toLocaleTimeString()}` : ""}</div>
      </div>`;
    }).join("");
  } catch (e) {
    app.innerHTML = `<div class="err">failed to load: ${e.message}</div>`;
  }
}
refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
